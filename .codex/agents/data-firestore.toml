\r
### Function naming conventions:\r
- **Real-time subscriptions**: `function subscribeTo[Resource](user: AppUser, onData: (data: T[]) => void, onError: (error: Error) => void): Unsubscribe` — return the `onSnapshot` unsubscribe function\r
- **One-time reads**: `async function get[Resource](id: string): Promise<T | null>`\r
- **List queries**: `async function list[Resources](filters): Promise<T[]>`\r
- **Creates**: `async function create[Resource](data: Omit<T, 'id' | 'createdAt' | 'updatedAt'>): Promise<string>` — returns new doc ID, sets `createdAt` and `updatedAt`\r
- **Updates**: `async function update[Resource](id: string, data: Partial<T>): Promise<void>` — ALWAYS set `updatedAt: new Date().toISOString()`\r
- **Deletes**: `async function delete[Resource](id: string): Promise<void>` — delete subcollections first if any exist\r
\r
### Role-based query filtering:\r
All query functions that filter by user role must accept `AppUser` and switch on `user.role`:\r
```typescript\r
function buildRoleQuery(user: AppUser, baseRef: CollectionReference) {\r
  switch (user.role) {\r
    case "pm":\r
      return query(baseRef, where("pmUserId", "==", user.uid));\r
    case "cm":\r
      return query(baseRef, where("pmUserId", "in", user.managedUserIds));\r
    case "admin":\r
      return query(baseRef); // no filter\r
  }\r
}\r
```\r
\r
## FIRESTORE SECURITY RULES PATTERNS\r
\r
- Rules file: `firestore.rules`\r
- Helper functions defined at the top of `rules_version = '2'`:\r
  - `getUserDoc()` — fetches the requesting user's document\r
  - `hasRole(role)` — checks user role\r
  - `isAdmin()` — `hasRole("admin")`\r
  - `isCM()` — `hasRole("cm")`\r
  - `isPM()` — `hasRole("pm")`\r
  - `isInOrg()` — checks org membership\r
  - `isAssignedPM(data)` — checks if requesting user is the assigned PM\r
  - `isManagingCM(data)` — checks if requesting user is the managing CM\r
- Valid roles in rules: `"admin"`, `"cm"`, `"pm"` — remove any `"director"` references if found\r
- Standard read pattern: `allow read: if isAdmin() || isAssignedPM(resource.data) || isManagingCM(resource.data);`\r
- Subcollections: fetch parent project with `get()` to check access\r
- KB collections: `allow read: if request.auth != null;` and `allow write: if isAdmin();`\r
- User docs: user can read own doc, admin can read/write all\r
\r
## FIRESTORE INDEXES\r
\r
- Defined in `firestore.indexes.json`\r
- Add composite indexes when queries use `where()` + `orderBy()` on different fields\r
- Format:\r
```json\r
{\r
  "collectionGroup": "projects",\r
  "queryScope": "COLLECTION",\r
  "fields": [\r
    { "fieldPath": "pmUserId", "order": "ASCENDING" },\r
    { "fieldPath": "updatedAt", "order": "DESCENDING" }\r
  ]\r
}\r
```\r
\r
