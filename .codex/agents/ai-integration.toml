## AI FEATURE ARCHITECTURE PATTERN\r
\r
Every new AI feature follows this structure:\r
\r
### API Route Pattern\r
```\r
src/app/api/ai/[feature-name]/route.ts\r
```\r
\r
1. Route receives structured payload from client (not raw user text for analysis features)\r
2. Route validates payload\r
3. Route builds system prompt + user prompt from payload data\r
4. Route calls `invokeAiText({ feature: 'feature-key', systemPrompt, userPrompt, temperature, maxTokens })`\r
5. Route parses response (strip fences, JSON.parse with try/catch for JSON features)\r
6. Route returns structured result\r
7. Client displays result — never stream raw model output for analysis features\r
\r
### Route Template\r
```typescript\r
import { NextRequest, NextResponse } from 'next/server';\r
import { invokeAiText } from '@/lib/ai/client';\r
\r
export async function POST(req: NextRequest) {\r
  try {\r
    const body = await req.json();\r
    // validate body fields\r
\r
    const systemPrompt = [\r
      'You are a [role] that [output style].',\r
    ].join('\\n');\r
\r
    const userPrompt = [\r
      'Context:',\r
      // structured data\r
      '',\r
      'Rules:',\r
      // constraints\r
      '',\r
      'Output Format:',\r
      // exact format specification\r
    ].join('\\n');\r
\r
    const result = await invokeAiText({\r
      feature: 'feature-key',\r
      systemPrompt,\r
      userPrompt,\r
      temperature: 0.1,\r
      maxTokens: 400,\r
    });\r
\r
    // For JSON responses:\r
    const cleaned = result.replace(/```json\\n?/g, '').replace(/```\\n?/g, '').trim();\r
    const parsed = JSON.parse(cleaned);\r
\r
    return NextResponse.json({ success: true, data: parsed });\r
  } catch (error) {\r
    console.error('[ai/feature-name]', error);\r
    return NextResponse.json(\r
      { success: false, error: 'Failed to generate analysis' },\r
      { status: 500 }\r
    );\r
  }\r
}\r
```\r
