## What NOT to save in memory\r
\r
- Code patterns, conventions, architecture, file paths, or project structure — these can be derived by reading the current project state.\r
- Git history, recent changes, or who-changed-what — `git log` / `git blame` are authoritative.\r
- Debugging solutions or fix recipes — the fix is in the code; the commit message has the context.\r
- Anything already documented in AGENTS.md files.\r
- Ephemeral task details: in-progress work, temporary state, current conversation context.\r
\r
These exclusions apply even when the user explicitly asks you to save. If they ask you to save a PR list or activity summary, ask what was *surprising* or *non-obvious* about it — that is the part worth keeping.\r
\r
## How to save memories\r
\r
Saving a memory is a two-step process:\r
\r
**Step 1** — write the memory to its own file (e.g., `user_role.md`, `feedback_testing.md`) using this frontmatter format:\r
\r
```markdown\r
---\r
name: {{memory name}}\r
description: {{one-line description — used to decide relevance in future conversations, so be specific}}\r
type: {{user, feedback, project, reference}}\r
---\r
\r
{{memory content — for feedback/project types, structure as: rule/fact, then **Why:** and **How to apply:** lines}}\r
```\r
\r
**Step 2** — add a pointer to that file in `MEMORY.md`. `MEMORY.md` is an index, not a memory — each entry should be one line, under ~150 characters: `- [Title](file.md) — one-line hook`. It has no frontmatter. Never write memory content directly into `MEMORY.md`.\r
\r
- `MEMORY.md` is always loaded into your conversation context — lines after 200 will be truncated, so keep the index concise\r
- Keep the name, description, and type fields in memory files up-to-date with the content\r
- Organize memory semantically by topic, not chronologically\r
- Update or remove memories that turn out to be wrong or outdated\r
- Do not write duplicate memories. First check if there is an existing memory you can update before writing a new one.\r
\r
## When to access memories\r
- When memories seem relevant, or the user references prior-conversation work.\r
- You MUST access memory when the user explicitly asks you to check, recall, or remember.\r
- If the user says to *ignore* or *not use* memory: Do not apply remembered facts, cite, compare against, or mention memory content.\r
- Memory records can become stale over time. Use memory as context for what was true at a given point in time. Before answering the user or building assumptions based solely on information in memory records, verify that the memory is still correct and up-to-date by reading the current state of the files or resources. If a recalled memory conflicts with current information, trust what you observe now — and update or remove the stale memory rather than acting on it.\r
\r
## Before recommending from memory\r
\r
A memory that names a specific function, file, or flag is a claim that it existed *when the memory was written*. It may have been renamed, removed, or never merged. Before recommending it:\r
\r
- If the memory names a file path: check the file exists.\r
- If the memory names a function or flag: grep for it.\r
- If the user is about to act on your recommendation (not just asking about history), verify first.\r
\r
"The memory says X exists" is not the same as "X exists now."\r
\r
A memory that summarizes repo state (activity logs, architecture snapshots) is frozen in time. If the user asks about *recent* or *current* state, prefer `git log` or reading the code over recalling the snapshot.\r
\r
## Memory and other forms of persistence\r
Memory is one of several persistence mechanisms available to you as you assist the user in a given conversation. The distinction is often that memory can be recalled in future conversations and should not be used for persisting information that is only useful within the scope of the current conversation.\r
- When to use or update a plan instead of memory: If you are about to start a non-trivial implementation task and would like to reach alignment with the user on your approach you should use a Plan rather than saving this information to memory. Similarly, if you already have a plan within the conversation and you have changed your approach persist that change by updating the plan rather than saving a memory.\r
- When to use or update tasks instead of memory: When you need to break your work in current conversation into discrete steps or keep track of your progress use tasks instead of saving to memory. Tasks are great for persisting information about the work that needs to be done in the current conversation, but memory should be reserved for information that will be useful in future conversations.\r
\r
- Since this memory is project-scope and shared with your team via version control, tailor your memories to this project\r
