## NON-NEGOTIABLE PATTERNS\r
\r
### Route File Convention\r
- All routes: `src/app/api/[path]/route.ts` with exported async functions: GET, POST, PATCH, DELETE\r
- CRUD resource pattern:\r
  - `src/app/api/[resource]/route.ts` → GET (list), POST (create)\r
  - `src/app/api/[resource]/[id]/route.ts` → GET (single), PATCH (update), DELETE\r
- Admin routes: `src/app/api/admin/[resource]/`\r
- AI routes: `src/app/api/ai/[feature]/route.ts`\r
\r
### Function Signatures\r
```typescript\r
// Without params\r
export async function GET(req: NextRequest): Promise<NextResponse> { ... }\r
\r
// With params — ALWAYS await params before destructuring\r
export async function GET(\r
  req: NextRequest,\r
  { params }: { params: Promise<{ id: string }> }\r
): Promise<NextResponse> {\r
  const { id } = await params;\r
  ...\r
}\r
```\r
\r
### Imports\r
```typescript\r
import { NextRequest, NextResponse } from "next/server";\r
import { adminDb, adminAuth } from "@/lib/firebase-admin";\r
import { requireRoles } from "@/lib/firebase-admin/request-auth";\r
```\r
\r
### Authentication Pattern\r
```typescript\r
const auth = await requireRoles(req, ["admin", "pm", "cm"]);\r
if (!auth.ok) return auth.response;\r
// Use auth.uid and auth.role after this point\r
```\r
Valid roles are ONLY: `"admin"`, `"cm"`, `"pm"` — there is NO "director" role. Never use a role that isn't in this list.\r
\r
### Error Handling\r
Wrap EVERY route handler in try/catch:\r
```typescript\r
export async function GET(req: NextRequest): Promise<NextResponse> {\r
  try {\r
    // ... route logic\r
  } catch (err) {\r
    const message = err instanceof Error ? err.message : "Failed to [specific action]";\r
    return NextResponse.json({ error: message }, { status: 500 });\r
  }\r
}\r
```\r
\r
### Response Patterns\r
- **List endpoints**: `return NextResponse.json({ items: [...] })`\r
- **Create endpoints**: `return NextResponse.json({ success: true, id: ref.id, ...key_fields })`\r
- **Update endpoints**: `return NextResponse.json({ success: true, id, updates })`\r
- **Delete endpoints**: Delete subcollections first (using batch), then parent doc, return `{ success: true, id }`\r
- **Errors**: `return NextResponse.json({ error: "Specific message" }, { status: 4xx })`\r
\r
### Field Validation\r
Check required fields early and return 400 with specific messages:\r
```typescript\r
const { name, type } = await req.json();\r
if (!name) return NextResponse.json({ error: "name is required" }, { status: 400 });\r
```\r
\r
### Firebase Admin SDK\r
- Use `adminDb` and `adminAuth` from `src/lib/firebase-admin/index.ts` — these are lazy-initialized proxies\r
- `adminDb.collection("name")`, `adminDb.batch()`, `adminDb.doc("path")` — use directly\r
- `adminAuth.createUser()`, `adminAuth.deleteUser()`, `adminAuth.updateUser()` — use directly\r
- Timestamps: use `new Date().toISOString()` for string timestamps. Do NOT use `Timestamp.now()` in API routes.\r
\r
### AI Route Patterns\r
- Use `invokeAiText()` from `src/lib/ai/client.ts` for feature-mapped calls — takes a feature key like `"portfolio-insights"`, `"cost-estimate"`, `"weekly-update-draft"`\r
- Use `invokeAiModelText()` for explicit model-key calls\r
- Build prompts as plain string arrays joined with `\\n`\r
- For JSON responses from AI: strip markdown fences (```json ... ```) before parsing\r
- Always handle JSON parse failure gracefully with a fallback\r
\r
## QUALITY CHECKS BEFORE FINISHING\r
1. Every route handler is wrapped in try/catch\r
2. Params are awaited before destructuring\r
3. Auth checks are present on all protected routes\r
4. Required fields are validated with 400 responses\r
5. Response shapes match the standard patterns (items, success+id, etc.)\r
6. No use of "director" role\r
7. No use of Timestamp.now() — use new Date().toISOString()\r
8. Imports use `@/lib/firebase-admin` not direct firebase-admin imports\r
9. Delete operations clean up subcollections before parent\r
10. AI routes handle parse failures gracefully\r
