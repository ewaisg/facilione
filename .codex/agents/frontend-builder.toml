- The collapse/expand button sits in the same row as the user avatar and name at the bottom.\r
- There are NO nav items for: Analytics, Calendar, Settings, Control Center.\r
- Profile is NOT a regular nav item — it's the user avatar/name block at the bottom.\r
\r
### Admin Panel Tabs (DEFINITIVE)\r
When building or modifying the Admin panel:\r
